name: Build UACME Akagi64 (Full Solution - Fixed Linking + /MT Static)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout UACME
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Retarget v145 → v143 and fix include casing
        shell: pwsh
        run: |
          Get-ChildItem -Path Source -Recurse -Filter *.vcxproj | ForEach-Object {
            (Get-Content $_.FullName) -replace 'v145', 'v143' | Set-Content $_.FullName
          }
          Get-ChildItem -Path Source -Recurse -Filter *.c | ForEach-Object {
            (Get-Content $_.FullName) -replace 'shared\\shared\.h', 'Shared\\shared.h' | Set-Content $_.FullName
          }

      - name: Build Akatsuki (the one failing) with full libs + /MT
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" > nul
          msbuild Source\Akatsuki\Akatsuki.vcxproj ^
            -t:Build ^
            -p:Configuration=Release ^
            -p:Platform=x64 ^
            -p:PlatformToolset=v143 ^
            -p:RuntimeLibrary=MultiThreaded ^
            -p:AdditionalDependencies="kernel32.lib;user32.lib;advapi32.lib;secur32.lib;ole32.lib;shell32.lib;gdi32.lib" ^
            -verbosity:minimal

      - name: Build FULL SOLUTION (rest of projects)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" > nul
          msbuild Source\uacme.sln ^
            -t:Build ^
            -p:Configuration=Release ^
            -p:Platform=x64 ^
            -p:PlatformToolset=v143 ^
            -p:RuntimeLibrary=MultiThreaded ^
            -p:AdditionalDependencies="kernel32.lib;user32.lib;advapi32.lib;secur32.lib;ole32.lib;shell32.lib;gdi32.lib" ^
            -verbosity:minimal

      - name: Upload Akagi64.exe
        uses: actions/upload-artifact@v4
        with:
          name: UACME-Akagi64-Full-MT-Fixed-Linking
          path: Source\Akagi\output\x64\Release\Akagi64.exe
          if-no-files-found: warn
