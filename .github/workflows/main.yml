name: Build UACME Akagi64 (Full Solution - Fixed Includes, Paths, Linking + /MT)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout UACME
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Fix includes and retarget to v143
        shell: pwsh
        run: |
          # Retarget toolset
          Get-ChildItem -Path Source -Recurse -Filter *.vcxproj | ForEach-Object {
            (Get-Content $_.FullName) -replace 'v145', 'v143' | Set-Content $_.FullName
            Write-Host "Retargeted: $($_.Name)"
          }

          # Fix all include statements (both lowercase and mixed)
          Get-ChildItem -Path Source -Recurse -Filter *.c -File | ForEach-Object {
            $content = Get-Content $_.FullName -Raw
            $content = $content -replace '(?i)shared\\shared\.h', 'Shared\\shared.h'
            $content = $content -replace '(?i)#include\s+["<]shared/shared\.h["<]', '#include "Shared/shared.h"'
            Set-Content $_.FullName $content
            Write-Host "Fixed includes in: $($_.Name)"
          }

      - name: Build FULL SOLUTION with /MT + Explicit Includes + Libs
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" > nul
          msbuild Source\uacme.sln ^
            -t:Build ^
            -p:Configuration=Release ^
            -p:Platform=x64 ^
            -p:PlatformToolset=v143 ^
            -p:RuntimeLibrary=MultiThreaded ^
            -p:UseOfMfc=Static ^
            -p:AdditionalIncludeDirectories="..\Shared;$(IncludePath)" ^
            -p:AdditionalDependencies="kernel32.lib;user32.lib;advapi32.lib;secur32.lib;ole32.lib;shell32.lib" ^
            -verbosity:minimal

      - name: Upload Akagi64.exe
        uses: actions/upload-artifact@v4
        with:
          name: UACME-Akagi64-Full-MT-Fixed
          path: Source\Akagi\output\x64\Release\Akagi64.exe
          if-no-files-found: warn
