name: Build UACME Akagi64 (Full Solution - Forced Linking + /MT Static)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout UACME
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Fix includes, retarget, and FORCE all libraries into Akatsuki
        shell: pwsh
        run: |
          # Retarget and fix includes
          Get-ChildItem -Path Source -Recurse -Filter *.vcxproj | ForEach-Object {
            (Get-Content $_.FullName) -replace 'v145', 'v143' | Set-Content $_.FullName
          }
          Get-ChildItem -Path Source -Recurse -Filter *.c -File | ForEach-Object {
            $content = Get-Content $_.FullName -Raw
            $content = $content -replace '(?i)shared\\shared\.h', 'Shared\\shared.h'
            $content = $content -replace '(?i)#include\s+["<]shared/shared\.h["<]', '#include "Shared/shared.h"'
            Set-Content $_.FullName $content
          }

          # FORCE libraries directly into Akatsuki.vcxproj (and others)
          $requiredLibs = "kernel32.lib;user32.lib;gdi32.lib;winspool.lib;comdlg32.lib;advapi32.lib;shell32.lib;ole32.lib;oleaut32.lib;uuid.lib;odbc32.lib;odbccp32.lib;secur32.lib"
          Get-ChildItem -Path Source -Recurse -Filter *.vcxproj | ForEach-Object {
            $xml = [xml](Get-Content $_.FullName)
            $ns = New-Object System.Xml.XmlNamespaceManager($xml.NameTable)
            $ns.AddNamespace("ns", "http://schemas.microsoft.com/developer/msbuild/2003")

            $linkGroup = $xml.SelectSingleNode("//ns:ItemDefinitionGroup/ns:Link", $ns)
            if ($linkGroup) {
              $depNode = $linkGroup.SelectSingleNode("ns:AdditionalDependencies", $ns)
              if ($depNode) {
                $depNode.InnerText = "$requiredLibs;$($depNode.InnerText)"
              } else {
                $newNode = $xml.CreateElement("AdditionalDependencies", $ns.LookupNamespace("ns"))
                $newNode.InnerText = $requiredLibs
                $linkGroup.AppendChild($newNode) | Out-Null
              }
            }
            $xml.Save($_.FullName)
            Write-Host "Forced libraries into $($_.Name)"
          }

      - name: Build FULL UACME with /MT
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" > nul
          msbuild Source\uacme.sln -t:Build -p:Configuration=Release -p:Platform=x64 -p:PlatformToolset=v143 -p:RuntimeLibrary=MultiThreaded -verbosity:minimal

      - name: Upload Akagi64.exe
        uses: actions/upload-artifact@v4
        with:
          name: UACME-Akagi64-Full-MT-Fixed
          path: Source\Akagi\output\x64\Release\Akagi64.exe
          if-no-files-found: warn
