name: Build UACME Akagi64 (Full Solution - Fixed Includes)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild (VS 2022)
      uses: microsoft/setup-msbuild@v2

    - name: Install .NET Framework SDK (required for some modules)
      shell: pwsh
      run: |
        # GitHub runners usually have .NET 4.8, but ensure it
        Write-Host "NETFX SDK should be present on windows-latest"

    - name: Retarget all projects from v145 to v143
      shell: pwsh
      run: |
        Get-ChildItem -Path . -Recurse -Filter *.vcxproj | ForEach-Object {
          (Get-Content $_.FullName) -replace 'v145', 'v143' | Set-Content $_.FullName
          Write-Host "Retargeted: $($_.Name)"
        }
        # Also fix any hardcoded include paths if needed (rare)
        Get-ChildItem -Path . -Recurse -Filter *.vcxproj | ForEach-Object {
          (Get-Content $_.FullName) -replace 'shared\\', 'Shared\\' | Set-Content $_.FullName
        }

    - name: Build the entire UACME solution (handles all includes + order)
      run: msbuild Source\uacme.sln -t:Build -p:Configuration=Release -p:Platform=x64 -p:PlatformToolset=v143 -verbosity:normal

    - name: Upload Akagi64.exe artifact
      uses: actions/upload-artifact@v4
      with:
        name: UACME-Akagi64-FullBuild
        path: Source\Akagi\x64\Release\Akagi64.exe
        if-no-files-found: error
