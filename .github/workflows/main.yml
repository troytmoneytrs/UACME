name: Build UACME Akagi64 (Correct Output Path)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout UACME source
      uses: actions/checkout@v4

    - name: Setup MSBuild (VS 2022)
      uses: microsoft/setup-msbuild@v2

    - name: Retarget projects v145 → v143
      shell: pwsh
      run: |
        Get-ChildItem -Path Source -Recurse -Filter *.vcxproj | ForEach-Object {
          (Get-Content $_.FullName) -replace 'v145', 'v143' | Set-Content $_.FullName
          Write-Host "Retargeted $($_.Name)"
        }

    - name: Build Akatsuki64.dll (payload)
      run: msbuild Source\Akatsuki\Akatsuki.vcxproj -p:Configuration=Release -p:Platform=x64 -p:PlatformToolset=v143

    - name: Build Fubuki64.dll (payload)
      run: msbuild Source\Fubuki\Fubuki.vcxproj -p:Configuration=Release -p:Platform=x64 -p:PlatformToolset=v143

    - name: Build Naka64.exe (encryptor)
      run: msbuild Source\Naka\Naka.vcxproj -p:Configuration=Release -p:Platform=x64 -p:PlatformToolset=v143

    - name: Run Naka to encrypt payloads and generate secrets
      working-directory: Source\Akagi\bin
      run: |
        ..\..\..\Naka\x64\Release\Naka64.exe
        ..\..\..\Naka\x64\Release\Naka64.exe --stable

    - name: Copy encrypted payloads to Akagi bin (critical step)
      shell: pwsh
      run: |
        Copy-Item -Path "Source\Akatsuki\output\x64\Release\Akatsuki64.*" -Destination "Source\Akagi\bin" -Force -ErrorAction SilentlyContinue
        Copy-Item -Path "Source\Fubuki\output\x64\Release\Fubuki64.*" -Destination "Source\Akagi\bin" -Force -ErrorAction SilentlyContinue
        Copy-Item -Path "Source\Akagi\bin\secrets*.bin" -Destination "Source\Akagi\bin" -Force -ErrorAction SilentlyContinue

    - name: Build Akagi64.exe (main tool)
      run: msbuild Source\Akagi\Akagi.vcxproj -p:Configuration=Release -p:Platform=x64 -p:PlatformToolset=v143

    - name: Upload Akagi64.exe
      uses: actions/upload-artifact@v4
      with:
        name: UACME-Akagi64-Fixed
        path: Source\Akagi\output\x64\Release\Akagi64.exe   # Correct path: output folder
        if-no-files-found: error
